@if (isLocked()) {
  <app-lock-screen
    (unlocked)="onUnlocked()"
    (dragProgressChange)="onDragProgress($event)" />
}

<app-navbar [unlocked]="hasUnlocked()" />

<div [class]="isLocked() ? 'content-blur' : ''"
     [style.filter]="isLocked() ? 'blur(' + blurAmount() + 'px)' : 'none'"
     [style.transition]="'filter 0.05s linear'">
  <app-hero></app-hero>
  <app-about-me></app-about-me>
  <app-projects></app-projects>
  <app-contact></app-contact>
  <footer>&copy; Tomas Portfolio</footer>
</div>
