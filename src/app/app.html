@if (isLocked()) {
  <app-lock-screen (unlocked)="onUnlocked()" (dragProgressChange)="onDragProgress($event)" />
}

<app-navbar [unlocked]="hasUnlocked()" />

<div [class]="isLocked() ? 'content-blur' : ''"
     [style.filter]="isLocked() ? 'blur(' + blurAmount() + 'px)' : 'none'"
     [style.transition]="'filter 0.05s linear'">
  <app-hero></app-hero>
  <app-about-me></app-about-me>
  <app-projects></app-projects>
  <app-contact></app-contact>

  <footer class="border-t border-slate-800 py-8 px-6">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-center gap-4">

      <a href="#" class="text-xl font-bold text-white hover:text-indigo-400 transition-colors">
        Tomás<span class="text-indigo-500">.dev</span>
      </a>

      <p class="text-slate-600 text-sm text-center">
        © 2026 Tomás Oliver — Diseñado y desarrollado con Angular & Tailwind
      </p>

    </div>
  </footer>

</div>
