<div class="fixed top-4 left-0 right-0 z-50 flex flex-col items-center px-4">

  <nav [class]="'relative w-full border shadow-2xl rounded-full transition-all duration-500 ' + 
             (isScrolled() && !isHovered() ? 'max-w-2xl' : 'max-w-6xl') + ' ' +
             (isVisible() ? 'navbar-enter' : 'navbar-hidden')">

    <!-- Capa 1: blur de fondo -->
    <div class="absolute inset-0 rounded-full backdrop-blur-2xl"></div>

    <!-- Capa 2: tinte de color con saturación -->
    <div class="absolute inset-0 rounded-full bg-slate-900/40 saturate-150"></div>

    <!-- Capa 3: gradiente de brillo superior -->
    <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-white/40 to-transparent"></div>

    <!-- Capa 4: reflejo interno superior -->
    <div class="absolute inset-x-0 top-0 h-1/2 bg-gradient-to-b from-white/10 to-transparent rounded-t-full"></div>

    <!-- Capa 5: borde luminoso inferior -->
    <div class="absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>

    <div [class]="'relative z-10 px-6 md:px-8 flex items-center justify-between transition-all duration-500 ' + 
               (isScrolled() && !isHovered() ? 'h-12' : 'h-16')">

      <!-- Logo -->
      <a href="#" [class]="'font-bold text-white tracking-tight hover:text-indigo-400 transition-all duration-500 ' + 
                         (isScrolled() && !isHovered() ? 'text-base' : 'text-xl')">
        Tomás<span class="text-indigo-500">.dev</span>
      </a>

      <!-- Links desktop -->
      <ul class="hidden md:flex items-center space-x-6">
        @for (item of menuItems; track item.label; let i = $index) {
        <li>
          <a [href]="item.link" class="relative group flex items-center justify-center h-6"
            style="transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);"
            [style.width]="textState() === 'hidden' || textState() === 'showing' ? '20px' : 'auto'"
            [title]="item.label">

            <!-- Texto -->
            <span class="font-medium text-slate-300 group-hover:text-white relative whitespace-nowrap text-sm"
              [style.display]="textState() === 'hidden' || textState() === 'showing' ? 'none' : 'inline'" [innerHTML]="textState() === 'hiding'
                  ? (item.label | typewriter:true:(i * 30):true)
                  : (item.label | typewriter:true:(i * 20):false)">
            </span>

            <!-- Ícono SVG -->
            <span [class]="'absolute transition-all duration-300 ease-in-out ' +
                         (textState() === 'hidden'
                           ? 'opacity-100 scale-100'
                           : 'opacity-0 scale-75 pointer-events-none')">
              <svg class="w-5 h-5 text-slate-300 group-hover:text-indigo-400 transition-colors duration-500 ease-in-out"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.svgPath" />
              </svg>
            </span>

          </a>
        </li>
        }
      </ul>

      <div class="flex items-center gap-3">

        <!-- Hamburguesa mobile -->
        <button (click)="toggleMenu()" class="md:hidden text-slate-300 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg"
            [class]="'transition-all duration-300 ' + (isScrolled() && !isHovered() ? 'h-5 w-5' : 'h-6 w-6')"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            @if (!isOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            }
          </svg>
        </button>

      </div>
    </div>
  </nav>

  <!-- Menú mobile -->
  <!-- Menú mobile -->
  @if (isOpen()) {
  <div class="mt-2 w-full max-w-6xl md:hidden animate-fade-in-down" style="
         border-radius: 1rem;
         border: 1px solid rgba(255, 255, 255, 0.12);
         backdrop-filter: blur(12px) saturate(280%) brightness(110%);
         -webkit-backdrop-filter: blur(12px) saturate(280%) brightness(110%);
         box-shadow:
           0 0 0 0.5px rgba(255, 255, 255, 0.08) inset,
           0 8px 32px rgba(0, 0, 0, 0.4),
           0 2px 8px rgba(99, 102, 241, 0.08);
         overflow: hidden;
         position: relative;
       ">

    <!-- Capa tinte -->
    <div class="absolute inset-0 bg-slate-900/50 pointer-events-none"></div>

    <!-- Brillo superior sutil -->
    <div
      class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent pointer-events-none">
    </div>

    <!-- Brillo inferior sutil -->
    <div
      class="absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent pointer-events-none">
    </div>

    <!-- Links -->
    <div class="relative z-10 p-4 flex flex-col space-y-2">
      @for (item of menuItems; track item.label) {
      <a [href]="item.link" (click)="isOpen.set(false)"
        class="flex items-center justify-center px-4 py-4 text-slate-300 hover:bg-white/10 hover:text-white rounded-xl transition-all font-medium">

        <!-- Contenedor centrado con ancho fijo -->
        <div class="flex items-center gap-3 w-32">

          <!-- Ícono -->
          <svg class="w-4 h-4 shrink-0 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.svgPath" />
          </svg>

          <!-- Label -->
          <span>{{ item.label }}</span>

        </div>

      </a>
      }
    </div>

  </div>
  }

</div>
